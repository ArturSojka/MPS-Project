name: Build Report

on:
  push:
    branches: [main, miskrz]
  pull_request:
    branches: [main]

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-report.txt

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Cache TinyTeX
        uses: actions/cache@v3
        with:
          path: ~/.TinyTeX
          key: ${{ runner.os }}-tinytex-v1

      - name: Install TinyTeX
        run: |
          if [ ! -d "$HOME/.TinyTeX" ]; then
            quarto install tinytex --no-prompt
          fi

      - name: Install Python dependencies
        run: pip install -r requirements-report.txt

      - name: Render report
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: quarto render report/main.qmd --to pdf

      - uses: actions/upload-artifact@v4
        with:
          name: report-pdf
          path: report/main.pdf
          retention-days: 30
